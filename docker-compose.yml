services:
  oracle-monitor:
    image: ghcr.io/foxy1402/oracle-monitoring-dashboard:latest
    container_name: oracle-monitor
    restart: unless-stopped
    ports:
      - "80:80"
    pid: host                          # shares host PID namespace → /proc shows all host data
    volumes:
      # /proc is intentionally NOT bind-mounted; pid:host already exposes the
      # host proc namespace via the container's own writable proc mount,
      # avoiding the AppArmor-vs-read-only-/proc conflict at container init.
      - /sys:/sys:ro
      - /etc/os-release:/etc/os-release:ro
      - /etc/hostname:/etc/hostname:ro
      - /var/log:/var/log:ro           # last login activity
    cap_add:
      - SYS_PTRACE                     # psutil process inspection
